<!doctype html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="https://unpkg.com/tailwindcss@^3.0.0/dist/tailwind.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/connexion.css" />
        <link
            rel="stylesheet"
            href="style/bootstrap-icons-1.13.1/font/bootstrap-icons.min.css"
        />
        <link rel="stylesheet" href="style/flowbite.min.css" />
        <title>CONNECTING</title>
    </head>
    <body class="body dark:bg-gray-900 bg-gray-50 min-h-screen">
        <div
            id="loader"
            class="fixed inset-0 flex items-center justify-center bg-blue-500 z-50"
        >
            <div class="animate-spin spin"></div>
        </div>

        <h3
            onclick="change()"
            class="top-4 right-4 z-50 cursor-pointer bg-white dark:bg-gray-900 p-3 transition-all"
        >
            <i
                class="theme-icon bi bi-brightness-high text-xl text-gray-700 dark:text-white"
            ></i>
        </h3>
        <section
            class="min-h-screen flex items-center justify-center px-4 py-8"
        >
            <div class="w-full max-w-md">
                <a
                    href="#"
                    class="flex items-center justify-center mb-6 text-6xl font-semibold text-gray-900 dark:text-white"
                >
                    <i class="bi bi-robot dark:text-white mr-2"></i>
                </a>

                <div
                    class="bg-white rounded-lg shadow-xl dark:bg-gray-800 dark:border-gray-700 border border-gray-200 overflow-hidden"
                >
                    <div class="p-6 sm:p-8">
                        <h1
                            class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white mb-6"
                        >
                            Connexion à votre compte
                        </h1>

                        <form class="space-y-5" id="formulaire">
                            <div>
                                <label
                                    for="email"
                                    class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                                    >Email</label
                                >
                                <div class="relative">
                                    <div
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
                                    >
                                        <i
                                            class="bi bi-envelope-fill text-gray-500 dark:text-gray-400"
                                        ></i>
                                    </div>
                                    <input
                                        type="email"
                                        name="email"
                                        id="email"
                                        class="w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                        placeholder="nom@exemple.com"
                                        required=""
                                    />
                                </div>
                            </div>

                            <div>
                                <label
                                    for="password"
                                    class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                                    >Mot de passe</label
                                >
                                <div class="relative">
                                    <div
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
                                    >
                                        <i
                                            class="bi bi-lock-fill text-gray-500 dark:text-gray-400"
                                        ></i>
                                    </div>
                                    <input
                                        type="password"
                                        name="password"
                                        id="password"
                                        placeholder="••••••••"
                                        class="w-full pl-10 pr-10 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                        required=""
                                    />
                                    <button
                                        type="button"
                                        onclick="pwd()"
                                        class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400"
                                    >
                                        <i class="bi text-lg" id="ipwd"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="flex items-center justify-between">
                                <div class="flex items-start">
                                    <div class="flex items-center h-5">
                                        <input
                                            id="remember"
                                            type="checkbox"
                                            class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-blue-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-blue-600 dark:ring-offset-gray-800"
                                        />
                                    </div>
                                    <div class="ml-3 text-sm">
                                        <label
                                            for="remember"
                                            class="text-gray-500 dark:text-gray-300"
                                            >Se souvenir de moi</label
                                        >
                                    </div>
                                </div>
                                <a
                                    href="#"
                                    class="text-sm font-medium text-blue-600 hover:underline dark:text-blue-500"
                                    >Mot de passe oublié?</a
                                >
                            </div>

                            <button
                                type="submit"
                                class="w-full text-gray-500 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg dark:text-white text-sm px-5 py-3 text-center dark:bg-gradient-to-r dark:from-blue-600 dark:to-purple-600 dark:hover:from-blue-700 dark:hover:to-purple-700 dark:focus:ring-blue-800 transition-all transform hover:scale-[1.02]"
                            >
                                <i class="bi bi-box-arrow-in-right mr-2"></i>
                                Se connecter
                            </button>

                            <div class="relative my-6">
                                <div class="absolute inset-0 flex items-center">
                                    <div
                                        class="w-full border-t border-gray-300 dark:border-gray-600"
                                    ></div>
                                </div>
                                <div
                                    class="relative flex justify-center text-sm"
                                >
                                    <span
                                        class="px-4 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400"
                                        >ou</span
                                    >
                                </div>
                            </div>

                            <p
                                class="text-sm font-light text-center text-gray-500 dark:text-gray-400"
                            >
                                Vous n'avez pas encore de compte?
                                <a
                                    href="inscription.html"
                                    class="font-medium text-blue-600 hover:underline dark:text-blue-500 inline-flex items-center"
                                >
                                    <i class="bi bi-person-plus mr-1"></i>
                                    S'inscrire
                                </a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <script src="style/flowbite.min.js"></script>
        <script src="js/connexion.js"></script>
    </body>
</html>
